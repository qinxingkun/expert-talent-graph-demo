<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>亿级科技知识图谱算法引擎 - 专家人才关系子系统原型</title>
    <link rel="stylesheet" href="styles.css">
    <!-- 引入 Font Awesome 图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航栏 -->
        <header class="top-header">
            <div class="logo">
                <i class="fas fa-project-diagram"></i>
                <span>AI战略咨询：亿级科技知识图谱算法引擎</span>
            </div>
            <div class="user-info">
                <span class="role-badge dev"><i class="fas fa-code"></i> 系统开发人员</span>
                <span class="role-badge ops"><i class="fas fa-tools"></i> 系统运维人员</span>
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=random" alt="User Avatar">
                    <span>管理员</span>
                </div>
            </div>
        </header>

        <div class="main-layout">
            <!-- 左侧侧边栏 -->
            <aside class="sidebar">
                <nav class="sidebar-nav">
                    <div class="nav-group">
                        <div class="group-title">核心功能模块</div>
                        <ul>
                            <li class="active" data-module="expert-relation">
                                <i class="fas fa-users-rectangle"></i>
                                <span>科技专家/人才直接关系</span>
                            </li>
                            <li data-module="entity-alignment">
                                <i class="fas fa-fingerprint"></i>
                                <span>实体对齐与消歧</span>
                            </li>
                            <li data-module="graph-construction">
                                <i class="fas fa-network-wired"></i>
                                <span>图谱自动化构建</span>
                            </li>
                        </ul>
                    </div>
                    <div class="nav-group">
                        <div class="group-title">管理与运维</div>
                        <ul>
                            <li data-module="config-center">
                                <i class="fas fa-cogs"></i>
                                <span>配置中心 (算法管理)</span>
                            </li>
                            <li data-module="monitor">
                                <i class="fas fa-chart-line"></i>
                                <span>服务监控</span>
                            </li>
                            <li data-module="api-management">
                                <i class="fas fa-cloud-upload-alt"></i>
                                <span>API 接口管理</span>
                            </li>
                        </ul>
                    </div>
                </nav>
            </aside>

            <!-- 主内容区 -->
            <main class="content-area">
                <div id="module-content">
                    <!-- 动态加载内容 -->
                </div>
            </main>
        </div>
    </div>

    <!-- 弹窗：参数配置 -->
    <div id="config-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-sliders-h"></i> 算法参数配置</h3>
                <span class="close-btn">&times;</span>
            </div>
            <div class="modal-body">
                <form id="test-config-form">
                    <div class="form-group">
                        <label>权重配置 (Weighted Co-occurrence)</label>
                        <div class="range-group">
                            <span>第一作者:</span>
                            <input type="range" min="0" max="1" step="0.1" value="0.8">
                            <span class="range-value">0.8</span>
                        </div>
                        <div class="range-group">
                            <span>通讯作者:</span>
                            <input type="range" min="0" max="1" step="0.1" value="0.9">
                            <span class="range-value">0.9</span>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>相似度阈值 (BERT-Siamese)</label>
                        <input type="number" min="0" max="1" step="0.01" value="0.85">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary close-btn">取消</button>
                <button class="btn-primary" id="save-config">确认配置</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
